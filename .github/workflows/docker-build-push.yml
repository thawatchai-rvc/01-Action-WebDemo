name: Build, Push & Deploy to K8s

on:
  push:
    branches: ["main"]

env:
  DOCKERHUB_REPO: thawatchai95/hello-web

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}:latest
            ${{ env.DOCKERHUB_REPO }}:sha-${{ github.sha }}

          # 👇 เพิ่มส่วนนี้เข้ามา (deploy to k8s)
      - name: Deploy to Kubernetes
        uses: steebchen/kubectl@v2
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG }}
        with:
          args: set image deployment/web-app-deployment nginx=${{ env.DOCKERHUB_REPO }}:sha-${{ github.sha }}

      - name: Verify deployment
        uses: steebchen/kubectl@v2
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG }}
        with:
          args: rollout status deployment/hello-web-deployment --timeout=2m